<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/canvas-gauges/gauge.min.js"></script>
</head>
<body>

<canvas id="gauge"></canvas>

<script>
// lấy giá trị từ URL (?value=xxx)
const params = new URLSearchParams(window.location.search);
let value = parseFloat(params.get("value")) || 0;

// tạo gauge
var gauge = new RadialGauge({
    renderTo: 'gauge',
    width: 300,
    height: 300,
    units: "W/m²",
    minValue: 0,
    maxValue: 2000,
    majorTicks: ["0","500","1000","1500","2000"],

    highlights: [
        { from: 0, to: 300, color: "green" },
        { from: 300, to: 700, color: "orange" },
        { from: 700, to: 2000, color: "red" }
    ],

    value: value
}).draw();
</script>

</body>
</html>
